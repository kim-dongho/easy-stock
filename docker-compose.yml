services:
  # Next.js 프론트엔드 (컨테이너 내부 3000 → 호스트 5050)
  web:
    build: ./apps/web
    ports:
      - "5050:3000"
    environment:
      # 컨테이너 간 통신이므로 서비스명(server)으로 접근
      - NEXT_PUBLIC_API_URL=http://server:5051
    depends_on:
      - server

  # Go API 서버 (DB 읽기 전용)
  server:
    build: ./apps/server
    ports:
      - "5051:5051"
    environment:
      - PORT=5051
      # 기존 quant-platform DB 공유 (SELECT only)
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/quant?sslmode=disable
